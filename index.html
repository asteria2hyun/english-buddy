<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>잉글리시 버디 · 영어 말하기 스터디</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --sky:#E8F3FB; --sky2:#F3F9FD; --cloud:#FFFFFF;
    --fox:#F08A5D; --fox-soft:#FDE7DC;
    --sun:#FFC94B; --sun-soft:#FFF2CF;
    --grass:#5FA97C; --grass-soft:#E2F1E7;
    --amber:#C77A3C; --amber-soft:#FBEBD9;
    --ink:#3A3A4A; --sub:#8C8CA1; --line:#E9EFF5;
    --me:#FFD37E; --blue:#5B87C7;
  }
  html,body{ height:100%; }
  body{ font-family:'Nunito',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--sky); color:var(--ink); display:flex; justify-content:center; }
  .display{ font-family:'Baloo 2','Nunito',sans-serif; }
  .app{ width:100%; max-width:540px; height:100dvh; display:flex; flex-direction:column; background:var(--sky); position:relative; overflow:hidden; }

  header{ padding:11px 14px; display:flex; align-items:center; gap:10px; background:var(--cloud); border-bottom:1px solid var(--line); }
  .avatar{ width:44px; height:44px; border-radius:50%; background:var(--fox-soft); display:grid; place-items:center; font-size:24px; flex:0 0 auto; cursor:pointer; box-shadow:0 3px 0 rgba(240,138,93,.2); }
  .htxt h1{ font-size:17px; font-weight:800; letter-spacing:-.2px; display:flex; align-items:center; gap:5px; }
  .htxt .sw{ font-size:11px; color:var(--fox); font-weight:800; cursor:pointer; }
  .htxt p{ font-size:11px; color:var(--sub); margin-top:1px; font-weight:600; }
  .level-badge{ margin-left:auto; background:var(--grass-soft); color:var(--grass); border-radius:999px; padding:6px 11px; font-size:12px; font-weight:800; white-space:nowrap; }

  .tabs{ display:flex; background:var(--cloud); border-top:1px solid var(--line); padding:6px 6px calc(6px + env(safe-area-inset-bottom)); gap:2px; }
  .tab{ flex:1; border:none; background:none; color:var(--sub); border-radius:13px; padding:7px 2px; font-size:10.5px; font-weight:800; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; font-family:inherit; }
  .tab .ic{ font-size:19px; }
  .tab.on{ color:var(--fox); background:var(--fox-soft); }

  .view{ flex:1; overflow-y:auto; display:none; flex-direction:column; }
  .view.on{ display:flex; }

  /* scenarios (롤플레이) */
  .scenarios{ display:flex; gap:7px; overflow-x:auto; padding:12px 14px 0; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .scenarios::-webkit-scrollbar{ display:none; }
  .sc-chip{ flex:0 0 auto; border:1.5px solid var(--line); background:#fff; color:var(--sub); border-radius:999px; padding:8px 13px; font-size:12.5px; font-weight:800; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .sc-chip.on{ background:var(--fox); color:#fff; border-color:var(--fox); }

  /* starter */
  .starter{ margin:12px 14px 2px; background:linear-gradient(135deg,var(--sun-soft),#fff); border:2px solid var(--sun); border-radius:20px; padding:14px 15px; }
  .starter .cap{ font-size:11px; font-weight:800; color:var(--amber); letter-spacing:.4px; }
  .starter .q{ font-family:'Baloo 2',sans-serif; font-size:19px; font-weight:700; margin:6px 0 3px; line-height:1.3; }
  .starter .qk{ font-size:12.5px; color:var(--sub); font-weight:600; }
  .starter .row{ display:flex; gap:8px; margin-top:10px; }
  .starter .row button{ border:none; border-radius:12px; padding:8px 12px; font-size:12.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .b-hear{ background:var(--sun); color:#6b4b12; } .b-new{ background:#fff; color:var(--amber); border:1.5px solid var(--sun) !important; }

  .chat{ flex:1; padding:13px 13px 6px; display:flex; flex-direction:column; gap:12px; }
  .row{ display:flex; gap:8px; align-items:flex-end; max-width:90%; }
  .row.me{ align-self:flex-end; flex-direction:row-reverse; }
  .mini{ width:29px; height:29px; border-radius:50%; display:grid; place-items:center; font-size:15px; flex:0 0 auto; }
  .mini.amy{ background:var(--fox-soft); } .mini.me{ background:var(--sun-soft); }
  .bubble{ padding:11px 14px; border-radius:19px; font-size:15px; line-height:1.5; font-weight:600; }
  .amy .bubble{ background:var(--cloud); border-bottom-left-radius:5px; box-shadow:0 1px 4px rgba(80,100,130,.06); }
  .me .bubble{ background:var(--me); color:#5a410f; border-bottom-right-radius:5px; }
  .kr{ display:block; margin-top:6px; font-size:12.5px; color:var(--sub); font-weight:600; }
  .fix{ margin-top:7px; font-size:12.5px; background:var(--amber-soft); color:var(--amber); border-radius:11px; padding:7px 10px; line-height:1.45; font-weight:700; }
  .amybtns{ margin-top:7px; display:flex; gap:12px; }
  .amybtns span{ font-size:11px; font-weight:800; cursor:pointer; user-select:none; }
  .s-hear{ color:var(--fox); } .s-say{ color:var(--grass); }
  .typing .bubble{ color:var(--sub); }
  .dot{ display:inline-block; animation:blink 1.2s infinite; } .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  /* Amy 말하는 무대 (음성 회화용) */
  .amystage{ display:flex; flex-direction:column; align-items:center; gap:5px; padding:14px 0 4px; }
  .afox{ font-size:52px; line-height:1; filter:drop-shadow(0 5px 6px rgba(240,138,93,.28)); }
  .amystage.speaking .afox-wrap{ animation:foxtalk .5s ease-in-out infinite; }
  @keyframes foxtalk{ 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-6px) rotate(3deg)} }
  .awave{ display:flex; align-items:center; gap:3px; height:22px; }
  .awave i{ width:4px; height:6px; background:var(--fox); border-radius:3px; opacity:.3; }
  .amystage.speaking .awave i{ opacity:1; animation:eq .8s ease-in-out infinite; }
  .awave i:nth-child(2){animation-delay:.12s} .awave i:nth-child(3){animation-delay:.24s} .awave i:nth-child(4){animation-delay:.36s} .awave i:nth-child(5){animation-delay:.18s} .awave i:nth-child(6){animation-delay:.30s}
  @keyframes eq{ 0%,100%{height:6px} 50%{height:22px} }
  .astatus{ font-size:12.5px; font-weight:800; color:var(--sub); }
  .amystage.speaking .astatus{ color:var(--fox); }
  /* 음성 메시지 버블 (영어 텍스트 숨김) */
  .bubble.voice .vmrow{ display:flex; align-items:center; gap:9px; }
  .vmwave{ display:flex; align-items:center; gap:2.5px; height:16px; }
  .vmwave i{ width:3px; height:8px; background:var(--fox); border-radius:2px; opacity:.55; animation:eq2 1.1s ease-in-out infinite; }
  .vmwave i:nth-child(2n){ animation-delay:.2s } .vmwave i:nth-child(3n){ animation-delay:.4s } .vmwave i:nth-child(4n){ animation-delay:.15s }
  @keyframes eq2{ 0%,100%{height:5px} 50%{height:16px} }
  .vmlabel{ font-size:12.5px; font-weight:700; color:var(--sub); }
  /* 시작 질문: 영어/한국어 숨기고 음성으로만 */
  .starter .q,.starter .qk{ display:none; }

  /* 기록 프로필 선택 칩 */
  .pchips{ display:flex; flex-wrap:wrap; gap:7px; margin:0 0 12px; }
  .pchip{ border:1.5px solid var(--line); background:#fff; color:var(--sub); border-radius:999px; padding:7px 13px; font-size:12.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .pchip.on{ border-color:var(--fox); background:var(--fox-soft); color:var(--fox); }
  /* 보고서 하단 버튼 */
  .newchat{ width:100%; margin-top:14px; border:none; background:var(--grass); color:#fff; border-radius:15px; padding:13px; font-size:14.5px; font-weight:800; cursor:pointer; font-family:inherit; box-shadow:0 4px 0 rgba(95,169,124,.35); }
  .newchat:active{ transform:translateY(2px); box-shadow:none; }
  .quizbtn{ width:100%; margin-bottom:14px; border:none; background:linear-gradient(135deg,var(--sun),#F5B72E); color:#6b4b12; border-radius:15px; padding:13px; font-size:14.5px; font-weight:800; cursor:pointer; font-family:inherit; box-shadow:0 4px 0 rgba(255,201,75,.4); }
  .quizbtn:active{ transform:translateY(2px); box-shadow:none; }
  /* 단어 퀴즈 모달 */
  .qtop{ font-size:12.5px; font-weight:800; color:var(--sub); }
  .qword{ font-family:'Baloo 2',sans-serif; font-size:34px; font-weight:800; color:var(--ink); margin:8px 0 2px; word-break:break-word; }
  .qhint{ font-size:13px; font-weight:700; color:var(--sub); margin-bottom:14px; }
  .qopts{ display:flex; flex-direction:column; gap:9px; }
  .qopt{ border:2px solid var(--line); background:#fff; color:var(--ink); border-radius:14px; padding:13px; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; }
  .qopt:active{ transform:scale(.99); }
  .qopt.right{ border-color:var(--grass); background:var(--grass-soft); color:var(--grass); }
  .qopt.wrong{ border-color:#E0483C; background:#FCE4E1; color:#E0483C; }
  .qopt:disabled{ cursor:default; }

  /* 보상 탭 */
  .sub2{ font-size:12px; color:var(--sub); font-weight:700; }
  .streakbig{ font-family:'Baloo 2',sans-serif; font-size:30px; font-weight:800; color:var(--fox); margin:2px 0; }
  .garden{ font-size:26px; line-height:1.5; letter-spacing:2px; word-break:break-word; }
  .unlockbar{ height:14px; background:var(--line); border-radius:999px; overflow:hidden; }
  .ub-fill{ height:100%; background:linear-gradient(90deg,var(--sun),var(--fox)); border-radius:999px; transition:width .5s; }
  .badgegrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-top:4px; }
  .badge{ background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:10px 6px; text-align:center; opacity:.55; filter:grayscale(.6); }
  .badge.on{ opacity:1; filter:none; border-color:var(--sun); background:var(--sun-soft); }
  .badge .be{ font-size:26px; line-height:1.1; }
  .badge .bn{ font-size:11.5px; font-weight:800; color:var(--ink); margin-top:3px; }
  .badge .bc{ font-size:10px; font-weight:700; color:var(--sub); margin-top:1px; }
  .badge.on .bc{ color:var(--amber); }
  /* 게임 놀이터 */
  .gtop{ display:flex; align-items:center; justify-content:space-between; font-weight:800; font-size:15px; margin-bottom:4px; }
  .gx{ border:none; background:var(--line); color:var(--ink); width:28px; height:28px; border-radius:50%; font-size:14px; font-weight:800; cursor:pointer; }
  .gsub{ font-size:12.5px; color:var(--sub); font-weight:700; margin-bottom:14px; }
  .gmenu{ display:flex; flex-direction:column; gap:10px; }
  .gcard{ display:flex; align-items:center; gap:12px; text-align:left; border:2px solid var(--line); background:#fff; border-radius:16px; padding:14px; cursor:pointer; font-family:inherit; }
  .gcard:active{ transform:scale(.99); } .gcard .ge{ font-size:30px; } .gcard .gname{ font-size:15px; font-weight:800; color:var(--ink); } .gcard .gdesc{ font-size:12px; color:var(--sub); font-weight:700; }
  .memgrid{ display:grid; gap:8px; margin-top:6px; }
  .memcard{ aspect-ratio:1/1; border:none; border-radius:13px; background:var(--fox-soft); color:var(--ink); font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; display:grid; place-items:center; padding:4px; word-break:break-word; line-height:1.15; }
  .memcard.up{ background:var(--sun-soft); border:2px solid var(--sun); }
  .memcard.matched{ background:var(--grass-soft); color:var(--grass); border:2px solid var(--grass); }

  /* Amy 꾸미기 액세서리 */
  .afox-wrap{ position:relative; width:64px; height:64px; display:grid; place-items:center; }
  .afox-wrap .acc{ position:absolute; pointer-events:none; line-height:1; }
  .afox-wrap .acc.hat{ top:-13px; font-size:26px; }
  .afox-wrap .acc.face{ top:15px; font-size:21px; }
  .afox-wrap .acc.neck{ bottom:-4px; font-size:23px; }
  .afox-wrap .acc.buddy{ right:-16px; top:6px; font-size:23px; }
  .afox-wrap.big{ width:104px; height:104px; }
  .afox-wrap.big .afox{ font-size:82px; }
  .afox-wrap.big .acc.hat{ top:-18px; font-size:42px; }
  .afox-wrap.big .acc.face{ top:26px; font-size:34px; }
  .afox-wrap.big .acc.neck{ bottom:-6px; font-size:38px; }
  .afox-wrap.big .acc.buddy{ right:-24px; top:12px; font-size:38px; }
  /* 별 상점 */
  #shopBody{ max-height:84vh; overflow-y:auto; }
  .amypreview{ display:grid; place-items:center; padding:16px 0 10px; border-radius:18px; margin:2px 0 4px; }
  .coinbal{ text-align:center; font-size:14px; font-weight:800; color:var(--amber); margin:4px 0 12px; }
  #shopMsg{ color:#E0483C; }
  .coinrow{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .coinnum{ font-family:'Baloo 2',sans-serif; font-size:26px; font-weight:800; color:var(--amber); }
  .shopcat{ margin-bottom:13px; text-align:left; }
  .shopgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:5px; }
  .shopitem{ border:1.5px solid var(--line); background:#fff; border-radius:14px; padding:9px 5px; text-align:center; cursor:pointer; font-family:inherit; }
  .shopitem:active{ transform:scale(.98); }
  .shopitem .si-e{ font-size:27px; line-height:1.1; }
  .shopitem .si-n{ font-size:11.5px; font-weight:800; color:var(--ink); margin-top:3px; }
  .shopitem .si-p{ font-size:11px; font-weight:800; color:var(--amber); margin-top:1px; }
  .shopitem.eq{ border-color:var(--grass); background:var(--grass-soft); }
  .shopitem.eq .si-p{ color:var(--grass); }

  .finish-wrap{ padding:4px 14px 10px; }
  .finish{ width:100%; border:none; background:var(--grass); color:#fff; border-radius:16px; padding:13px; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; box-shadow:0 4px 0 rgba(95,169,124,.35); }
  .finish:active{ transform:translateY(2px); box-shadow:none; } .finish:disabled{ opacity:.5; box-shadow:none; }

  .composer{ padding:9px 12px calc(9px + env(safe-area-inset-bottom)); background:var(--cloud); border-top:1px solid var(--line); }
  .crow{ display:flex; align-items:center; gap:8px; }
  #txt{ flex:1; border:2px solid var(--line); border-radius:22px; padding:11px 15px; font-size:15px; outline:none; background:#fff; color:var(--ink); font-family:inherit; font-weight:600; }
  #txt:focus{ border-color:var(--fox); }
  .btn{ border:none; border-radius:50%; width:46px; height:46px; flex:0 0 auto; cursor:pointer; font-size:20px; display:grid; place-items:center; }
  .mic{ background:var(--fox); color:#fff; box-shadow:0 4px 0 rgba(240,138,93,.35); }
  .mic.rec{ background:#E0483C; animation:pulse 1s infinite; }
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,72,60,.5)}100%{box-shadow:0 0 0 14px rgba(224,72,60,0)}}
  .send{ background:var(--grass); color:#fff; box-shadow:0 4px 0 rgba(95,169,124,.35); }
  .btn:active{ transform:translateY(2px); box-shadow:none; }
  .hint{ text-align:center; font-size:11px; color:var(--sub); margin-top:6px; font-weight:600; }
  .convo{ width:100%; border:2px solid var(--grass); background:var(--grass-soft); color:var(--grass); border-radius:16px; padding:10px; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; margin-bottom:9px; }
  .convo.on{ background:var(--grass); color:#fff; border-color:var(--grass); animation:live 1.6s infinite; }
  @keyframes live{ 0%,100%{ box-shadow:0 0 0 0 rgba(95,169,124,.45);} 50%{ box-shadow:0 0 0 8px rgba(95,169,124,0);} }

  /* reports */
  .report{ padding:15px 15px 26px; }
  .empty{ margin:44px 24px; text-align:center; color:var(--sub); }
  .empty .e{ font-size:44px; } .empty h3{ font-size:16px; color:var(--ink); margin:10px 0 5px; font-weight:800; } .empty p{ font-size:13px; font-weight:600; line-height:1.6; }
  .empty button{ margin-top:16px; border:none; background:var(--fox); color:#fff; border-radius:14px; padding:12px 22px; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; box-shadow:0 4px 0 rgba(240,138,93,.35); }
  .rhead{ display:flex; align-items:center; gap:10px; margin-bottom:13px; }
  .rhead .r-emoji{ font-size:29px; } .rhead h2{ font-size:19px; font-weight:800; } .rhead .date{ font-size:12px; color:var(--sub); font-weight:700; }
  .card{ background:var(--cloud); border-radius:18px; padding:14px 15px; margin-bottom:11px; box-shadow:0 1px 5px rgba(80,100,130,.05); }
  .card .lbl{ font-size:12px; font-weight:800; letter-spacing:.3px; color:var(--fox); margin-bottom:8px; }
  .card.g .lbl{ color:var(--grass); } .card.a .lbl{ color:var(--amber); } .card.b .lbl{ color:var(--blue); }
  .card p{ font-size:14px; line-height:1.6; font-weight:600; }
  .card ul{ list-style:none; display:flex; flex-direction:column; gap:8px; }
  .card li{ font-size:14px; line-height:1.5; font-weight:600; padding-left:21px; position:relative; }
  .card li::before{ content:"✔"; position:absolute; left:0; color:var(--grass); font-weight:800; }
  .card.a li::before{ content:"→"; color:var(--amber); }
  .level-line{ background:var(--grass-soft); color:var(--grass); border-radius:14px; padding:10px 14px; font-size:15px; font-weight:800; text-align:center; margin-bottom:11px; }
  .fixcard{ border-left:4px solid var(--amber); }
  .fixcard .said{ font-size:14px; font-weight:700; color:var(--sub); text-decoration:line-through; }
  .fixcard .better{ font-size:15px; font-weight:800; color:var(--ink); margin:4px 0; }
  .fixcard .why{ font-size:12.5px; color:var(--amber); font-weight:700; }
  .vocab .w{ padding:10px 2px; border-bottom:1px dashed var(--line); } .vocab .w:last-child{ border-bottom:none; }
  .vocab .word{ font-family:'Baloo 2',sans-serif; font-size:17px; font-weight:700; color:var(--fox); }
  .vocab .mean{ font-size:14px; font-weight:700; margin-top:1px; }
  .vocab .ex{ font-size:12.5px; color:var(--sub); font-weight:600; margin-top:3px; font-style:italic; }
  .praise{ background:linear-gradient(135deg,var(--sun-soft),#fff); border:2px solid var(--sun); border-radius:18px; padding:15px; text-align:center; margin-bottom:13px; }
  .praise .p1{ font-size:32px; } .praise .p2{ font-size:16px; font-weight:800; margin-top:5px; line-height:1.5; }
  .pron-sum{ display:flex; gap:10px; align-items:center; }
  .pron-score{ font-family:'Baloo 2',sans-serif; font-size:30px; font-weight:800; color:var(--grass); }
  .pron-stars{ font-size:17px; letter-spacing:1px; }
  .toolbar{ display:flex; justify-content:flex-end; gap:6px; margin-bottom:9px; }
  .toolbar button{ border:1.5px solid var(--line); background:#fff; color:var(--sub); border-radius:12px; padding:7px 12px; font-size:12px; font-weight:800; cursor:pointer; font-family:inherit; }

  /* history */
  .hitem{ background:var(--cloud); border-radius:16px; padding:13px 15px; margin-bottom:10px; display:flex; align-items:center; gap:12px; cursor:pointer; box-shadow:0 1px 5px rgba(80,100,130,.05); }
  .hitem .hdate{ font-weight:800; font-size:15px; } .hitem .hsub{ font-size:12px; color:var(--sub); font-weight:700; margin-top:2px; }
  .hitem .hlv{ margin-left:auto; background:var(--grass-soft); color:var(--grass); border-radius:999px; padding:5px 10px; font-size:11.5px; font-weight:800; white-space:nowrap; }
  .hitem .hdel{ font-size:16px; padding:4px; }

  /* overlays */
  .overlay{ position:absolute; inset:0; background:rgba(40,50,70,.45); display:none; align-items:flex-end; justify-content:center; z-index:50; }
  .overlay.on{ display:flex; }
  .sheet{ background:var(--sky2); width:100%; max-height:90%; border-radius:24px 24px 0 0; overflow-y:auto; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); }
  .sheet h3{ font-size:18px; font-weight:800; margin-bottom:3px; } .sheet .sh-sub{ font-size:12.5px; color:var(--sub); font-weight:600; margin-bottom:14px; }
  .prof-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .prof{ background:#fff; border:2px solid var(--line); border-radius:16px; padding:11px 13px; display:flex; align-items:center; gap:11px; cursor:pointer; }
  .prof.active{ border-color:var(--fox); background:var(--fox-soft); }
  .prof .pe{ font-size:24px; } .prof .pn{ font-weight:800; font-size:15px; } .prof .pl{ font-size:11.5px; color:var(--sub); font-weight:700; }

<script>
/* ============ 저장소 (영구 저장 + 세션 폴백) ============ */
const _mem={};
let _serverOK=true;   // 서버 저장소(KV) 연결 여부 — 미설정이면 자동으로 localStorage만 사용
async function _api(action,key,value,prefix){
  let lastErr;
  for(let attempt=0;attempt<3;attempt++){   // 일시적 네트워크 끊김 재시도 (데이터 유실 방지)
    try{
      const r=await fetch('/api/store',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,key,value,prefix})});
      if(!r.ok) throw new Error('store '+r.status);
      return await r.json();
    }catch(e){ lastErr=e; }
  }
  throw lastErr;
}
const store={
  async get(k){
    let localVal;   // 이 기기 로컬 값 (마이그레이션용)
    try{ const v=localStorage.getItem(k); if(v!=null) localVal=JSON.parse(v); }catch(e){}
    if(_serverOK){ try{ const d=await _api('get',k);
      if(d&&d.disabled){ _serverOK=false; }
      else if(d&&d.ok){
        if(d.value!=null) return JSON.parse(d.value);                 // 서버 값이 우선
        if(localVal!==undefined){ try{ await _api('set',k,localVal); }catch(e){} return localVal; } // 서버가 비었고 로컬에 있으면 서버로 올림
        return null;
      }
    }catch(e){} }
    if(localVal!==undefined) return localVal;
    return (k in _mem)?_mem[k]:null;
  },
  async set(k,v){ _mem[k]=v;
    try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){}       // 오프라인/즉시 캐시
    if(_serverOK){ try{ const d=await _api('set',k,v); if(d&&d.disabled) _serverOK=false; }catch(e){} }
  },
  async del(k){ delete _mem[k];
    try{ localStorage.removeItem(k); }catch(e){}
    if(_serverOK){ try{ await _api('del',k); }catch(e){} }
  },
  async list(p){
    let keys=null;
    if(_serverOK){ try{ const d=await _api('list',null,null,p); if(d&&d.disabled){ _serverOK=false; } else if(d&&d.ok){ keys=d.keys; } }catch(e){} }
    const set=new Set(keys||[]);
    try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(p)) set.add(k); } }catch(e){}
    Object.keys(_mem).filter(k=>k.startsWith(p)).forEach(k=>set.add(k));
    return [...set];
  }
};
// 이 기기(localStorage)에만 있는 데이터를 서버로 백업 — 서버에 이미 있는 건 절대 덮지 않음(빈 칸만 채움)
async function backupLocalToServer(){
  if(!_serverOK) return;
  const pat=/^(profiles|activeId|report:|memory:|quizbest:|badges:|coinbonus:|coinspent:|owned:|amyOutfit:)/;
  let localKeys=[];
  try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&pat.test(k)) localKeys.push(k); } }catch(e){ return; }
  for(const k of localKeys){
    try{
      const d=await _api('get',k);
      if(d&&d.disabled){ _serverOK=false; return; }
      if(d&&d.ok && d.value==null){                 // 서버에 없음 → 로컬 값 올리기
        const raw=localStorage.getItem(k); if(raw!=null){ try{ await _api('set',k,JSON.parse(raw)); }catch(e){} }
      }
    }catch(e){ /* 네트워크 문제면 다음 기회에 */ }
  }
}

/* ============ 상태 ============ */
let profiles=[], activeId=null, P=null;
let childName="친구";
let apiMessages=[], sessionLog=[], liveVocab={}, pronScores=[];
let levelEMA=1.6, turnCount=0, pendingStarter=null, reportsData=null;
let enVoice=null, voiceOn=true, profileMemory="", memorySaved=false;
let currentReportTs=null, histProfileId=null;   // 세션당 보고서 1개 / 기록 탭에서 보는 프로필
let amyOutfit={};   // 프로필별 Amy 꾸미기 (hat/face/neck/buddy/bg)
let recMode='chat', pronTarget='';
let continuousMode=false, amySpeaking=false, recording=false, awaitingReply=false;
let childAge=10, activeScenario=null;

const LEVELS=[{e:"🌱",label:"씨앗"},{e:"🌿",label:"새싹"},{e:"🌳",label:"나무"},{e:"🌸",label:"꽃"},{e:"⭐",label:"별"}];
function levelInfo(n){ const i=Math.max(0,Math.min(4,Math.round(n)-1)); return {n:i+1,e:LEVELS[i].e,label:LEVELS[i].label}; }
function updateBadge(){ const L=levelInfo(levelEMA); document.getElementById('levelBadge').textContent=`${L.e} Lv.${L.n}·${L.label}`; }
function chime(){ try{ const ac=new (window.AudioContext||window.webkitAudioContext)(); const notes=[523,659,784,1047]; notes.forEach((f,i)=>{ const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle'; o.frequency.value=f; o.connect(g); g.connect(ac.destination); const t=ac.currentTime+i*0.12; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.25,t+0.03); g.gain.exponentialRampToValueAtTime(0.001,t+0.35); o.start(t); o.stop(t+0.36); }); }catch(e){} }
function celebrate(emoji,title,subHTML){
  const lu=document.getElementById('levelup');
  document.getElementById('luBadge').textContent=emoji;
  document.getElementById('luTitle').textContent=title;
  document.getElementById('luSub').innerHTML=subHTML;
  const colors=['#F08A5D','#FFC94B','#5FA97C','#5B87C7','#C77A3C'];
  for(let i=0;i<26;i++){ const c=document.createElement('div'); c.className='confetti'; c.style.left=(Math.random()*100)+'%'; c.style.background=colors[i%colors.length]; c.style.animationDuration=(1.6+Math.random()*1.2)+'s'; c.style.animationDelay=(Math.random()*0.3)+'s'; lu.appendChild(c); setTimeout(()=>c.remove(),3200); }
  lu.classList.add('on'); chime();
  setTimeout(()=>lu.classList.remove('on'),2600);
}
function celebrateBadges(list){ if(!list||!list.length) return; const b=list[0]; celebrate(b.e,'NEW STICKER! 🎉',`<b>${esc(b.n)}</b> 스티커 획득!${list.length>1?` 외 ${list.length-1}개`:''}`); }
function celebrateLevelUp(n){
  const L=levelInfo(n);
  celebrate(L.e,'LEVEL UP!',`<b>Lv.${L.n} · ${L.label}</b> 단계가 됐어요!`);
}
document.addEventListener('click',e=>{ const lu=document.getElementById('levelup'); if(lu.classList.contains('on')&&e.target.closest('.levelup')) lu.classList.remove('on'); });

/* ============ 시작 질문 ============ */
const STARTERS={
  easy:[["What is your favorite animal? Tell me why.","가장 좋아하는 동물이 뭐야? 왜 좋아하는지 말해줘"],["What is your favorite food, and why do you like it?","가장 좋아하는 음식이 뭐야? 왜 좋아해?"],["What do you like to do after school?","방과 후에 뭐 하는 걸 좋아해?"],["Tell me about your favorite toy or game.","가장 좋아하는 장난감이나 게임에 대해 말해줘"],["What color do you like, and what things are that color?","무슨 색을 좋아해? 그 색 물건은 뭐가 있어?"],["What makes you happy?","뭐가 널 행복하게 해?"],["Tell me about something you did today.","오늘 한 일 중 하나를 말해줘"],["What is your favorite fruit? How does it taste?","가장 좋아하는 과일이 뭐야? 어떤 맛이야?"]],
  mid:[["What did you do today?","오늘 뭐 했어?"],["What is your favorite subject at school?","학교에서 가장 좋아하는 과목이 뭐야?"],["Tell me about your best friend.","가장 친한 친구에 대해 말해줄래?"],["What do you like to do on weekends?","주말에 뭐 하는 걸 좋아해?"],["What is your favorite season? Why?","가장 좋아하는 계절이 뭐야? 왜?"],["What game do you like to play?","어떤 게임 하는 걸 좋아해?"]],
  high:[["If you could have any superpower, what would it be?","초능력을 가질 수 있다면 뭘 갖고 싶어?"],["What do you want to be when you grow up?","커서 뭐가 되고 싶어?"],["Tell me about a fun place you visited.","재미있게 다녀온 곳에 대해 말해줄래?"],["What makes you really happy?","뭐가 널 정말 행복하게 해?"],["If you could travel anywhere, where would you go?","어디든 갈 수 있다면 어디로 가고 싶어?"]]
};
function starterBucket(){ const n=Math.round(levelEMA); return n<=2?"easy":(n===3?"mid":"high"); }
function newStarter(){ const pool=STARTERS[starterBucket()]; const p=pool[Math.floor(Math.random()*pool.length)]; pendingStarter=p[0]; document.getElementById('stQ').textContent=p[0]; document.getElementById('stK').textContent=p[1]; }

/* ============ 상황극(롤플레이) ============ */
const SCENARIOS=[
  {key:'restaurant',label:'🍔 식당',sys:"You are a friendly restaurant waiter and the child is the customer ordering food. Greet her, ask what she wants, suggest simple dishes, and ask about drinks.",opener:"Welcome to Fox Diner! Here is your menu. What would you like to eat today?",openerKr:"폭스 식당에 온 걸 환영해! 여기 메뉴야. 오늘 뭐 먹고 싶어?"},
  {key:'shopping',label:'🛍️ 가게',sys:"You are a shopkeeper and the child is a customer buying something. Ask what she is looking for, and talk simply about color, size and price.",opener:"Hi! Welcome to my shop. What are you looking for today?",openerKr:"안녕! 우리 가게에 온 걸 환영해. 오늘 뭐 찾고 있어?"},
  {key:'intro',label:'👋 자기소개',sys:"You are meeting the child for the first time and help her introduce herself: name, age, likes, family and hobbies.",opener:"Hi! Nice to meet you! My name is Juny. What is your name?",openerKr:"안녕! 만나서 반가워! 내 이름은 Juny야. 네 이름은 뭐야?"},
  {key:'directions',label:'🗺️ 길찾기',sys:"You are a friendly local and the child is a traveler. Practice simple directions: left, right, straight, near, far.",opener:"Hello! You look a little lost. Where do you want to go?",openerKr:"안녕! 길을 좀 잃은 것 같네. 어디로 가고 싶어?"},
  {key:'zoo',label:'🐾 동물원',sys:"You and the child are visiting a zoo together. Talk about animals, how they look, what they eat, and which ones she likes.",opener:"Wow, we are at the zoo! Look — a big lion over there! What animal do you want to see first?",openerKr:"와, 우리 동물원에 왔어! 저기 봐 — 큰 사자야! 어떤 동물 먼저 보고 싶어?"},
  {key:'doctor',label:'🩺 병원',sys:"You are a kind doctor and the child is the patient. Ask how she feels and where it hurts, then give gentle, simple advice.",opener:"Hello! I'm Doctor Juny. How are you feeling today?",openerKr:"안녕! 나는 Juny 의사 선생님이야. 오늘 몸은 좀 어때?"}
];
function renderScenarioChips(){
  const el=document.getElementById('scenarios'); if(!el) return;
  const chips=[{key:'free',label:'🎲 자유 대화'},...SCENARIOS];
  el.innerHTML=chips.map(s=>`<button class="sc-chip ${((s.key==='free'&&!activeScenario)||(activeScenario&&activeScenario.key===s.key))?'on':''}" data-sc="${s.key}">${s.label}</button>`).join('');
  el.querySelectorAll('.sc-chip').forEach(b=>b.onclick=()=>startScenario(b.dataset.sc));
}
function startScenario(key){
  if(key==='free'){
    activeScenario=null; renderScenarioChips();
    const st=document.getElementById('starter');
    if(!chat.children.length){ st.style.display='block'; newStarter(); speak(document.getElementById('stQ').textContent); }
    return;
  }
  const sc=SCENARIOS.find(s=>s.key===key); if(!sc) return;
  activeScenario=sc; renderScenarioChips();
  document.getElementById('starter').style.display='none';
  pendingStarter=null;
  addAmy(sc.opener,sc.openerKr,'');
  apiMessages.push({role:'assistant',content:sc.opener});
}

/* ============ 음성 ============ */
function pickVoice(){ const vs=speechSynthesis.getVoices(); const en=vs.filter(v=>/^en([-_]|$)/i.test(v.lang));
  enVoice=en.find(v=>/en[-_]?US/i.test(v.lang)&&/google/i.test(v.name))            // Google US (가장 자연스러움)
        ||en.find(v=>/google/i.test(v.name))
        ||en.find(v=>/natural|samantha|aria|jenny|ava|libby/i.test(v.name))         // 고품질 내장 음성
        ||en.find(v=>/en[-_]?US/i.test(v.lang)&&/female|zira/i.test(v.name))
        ||en.find(v=>/en[-_]?US/i.test(v.lang))||en[0]||null; }
speechSynthesis.onvoiceschanged=pickVoice; pickVoice();

async function talk(userText){
  awaitingReply=true;
  addMe(userText); apiMessages.push({role:'user',content:userText}); turnCount++; addTyping();
  const target=levelInfo(levelEMA).n, stretch=(turnCount%4===0);
  const askedNote=pendingStarter?`You just asked her: "${pendingStarter}". She is answering it.`:"";
  const memNote=profileMemory?`\nMEMORY from your past chats with her (use ONE of these naturally to build continuity when it fits, e.g. ask a warm follow-up about something she mentioned before — do NOT list them and don't force it every turn): ${profileMemory}`:"";
  const scenarioNote=activeScenario?`\nROLE-PLAY SCENE: ${activeScenario.sys} Stay in character and keep the scene going, but still keep language simple for her level and end with one open-ended question.`:"";
  const system=`You are Juny, a warm, patient, cheerful English tutor (a friendly fox) for a ${childAge}-year-old Korean child. This is a speaking practice study.
${askedNote}${memNote}${scenarioNote}
Her current level is about ${target} out of 5 (1=absolute beginner, 5=fluent kid).
STYLE:
- Speak in SIMPLE, SHORT English, only 1-2 short sentences. Match difficulty to level ${target}.
- Be warm and encouraging, but do NOT call her by name — never say her name or insert it into sentences. Just talk naturally.
- ALWAYS end with ONE easy, OPEN-ENDED question she can explain or describe — ask "what / why / how / tell me about...", and NEVER a yes/no question (avoid "Do you like...?", "Is it...?").
${stretch?'- CHALLENGE: this turn, gently include ONE slightly harder word or a bit longer sentence to help her grow, kept understandable.':''}
- If she made a mistake, model the correct sentence gently.
FULL-SENTENCE COACHING (important):
- If she answered with only ONE word or a short fragment (e.g. "Blue.", "Dog", "Yes"), FIRST praise it, THEN show her how to say it as a FULL sentence and invite her to try, e.g. "Nice! You can also say: 'My favorite color is blue.' Can you say the whole sentence?".
- Model complete sentences with subject + verb. Keep encouraging her to speak in full sentences, but never scold. For very low level (1), one short full sentence is enough.
- When she DOES answer in a full sentence, praise that effort specifically ("Great full sentence!").
Return ONLY a JSON object (no markdown) with keys:
"reply": your English response (1-2 short sentences, ends with a question),
"korean": natural Korean translation of your reply,
"correction": if she made a grammar/word mistake OR answered with only a word/fragment, ONE short gentle Korean tip. For fragments, show the full English sentence she could say (e.g. "‘Blue’보다 ‘My favorite color is blue.’처럼 문장으로 말해봐요"); else "",
"level": integer 1-5 estimate of HER level from her message,
"vocab": array (0-2) of words YOU used a beginner might not know, each {"word":"...","kr":"짧은 뜻"}; else [].`;
  try{
    const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1000,system,messages:apiMessages})});
    const data=await res.json();
    const raw=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    let obj; try{ obj=JSON.parse(raw.replace(/```json|```/g,'').trim()); }catch(e){ obj={reply:raw||"Let's try again!",korean:"",correction:"",level:target,vocab:[]}; }
    rmTyping(); addAmy(obj.reply,obj.korean,obj.correction);
    apiMessages.push({role:'assistant',content:obj.reply});
    sessionLog.push({child:userText,amy:obj.reply,correction:obj.correction||""});
    (obj.vocab||[]).forEach(v=>{ if(v&&v.word) liveVocab[v.word.toLowerCase()]={kr:v.kr||"",word:v.word}; });
    if(typeof obj.level==='number'){
      const prev=levelInfo(levelEMA).n;
      const gap=obj.level-levelEMA;                          // 실력 추정치 - 현재 레벨
      // 잘하면 빠르게 업(격차 클수록 더), 못하면 천천히(한 번 실수로 급락 방지)
      const w = gap>0 ? (gap>=2 ? 0.72 : 0.5) : 0.25;
      levelEMA = levelEMA*(1-w) + obj.level*w;
      const now=levelInfo(levelEMA).n; updateBadge(); if(P){P.level=levelEMA; saveProfiles();} if(now>prev) celebrateLevelUp(now);

}

const STOP=new Set(['a','an','the','to','is','are','it','of','in','on','and','you','i','do','my','me','so','too','very']);
function lev(a,b){ const m=[]; for(let i=0;i<=b.length;i++)m[i]=[i]; for(let j=0;j<=a.length;j++)m[0][j]=j; for(let i=1;i<=b.length;i++)for(let j=1;j<=a.length;j++)m[i][j]=b[i-1]===a[j-1]?m[i-1][j-1]:Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1); return m[b.length][a.length]; }
function sim(a,b){ if(a===b)return 1; const L=Math.max(a.length,b.length); return L?1-lev(a,b)/L:0; }
function tok(s){ return s.toLowerCase().replace(/[^a-z0-9' ]/g,'').split(/\s+/).filter(Boolean); }
function scorePron(target,heard){
  const tw=tok(target), hw=tok(heard); let sum=0, weak=[];
  tw.forEach(w=>{ let best=0; hw.forEach(h=>best=Math.max(best,sim(w,h))); sum+=best; if(best<0.72 && !STOP.has(w) && w.length>2) weak.push(w); });
  const score=Math.round((sum/Math.max(1,tw.length))*100);
  return {score,weak:[...new Set(weak)].slice(0,4),stars:score>=90?5:score>=75?4:score>=60?3:score>=40?2:1};
}
function startPron(sentence){
  if(!SR){ alert("이 브라우저는 음성인식을 지원하지 않아요. Chrome/웨일에서 열어주세요!"); return; }
  pronTarget=sentence; speechSynthesis.cancel();
  try{ if(recording){ recog.abort(); recording=false; mic.classList.remove('rec'); } }catch(e){}
  recMode='pron';
  document.getElementById('pmodalBody').className='';
  document.getElementById('pmodalBody').innerHTML=`<div class="listening"><div class="pbig">🎙️</div><h3>따라 말해보세요!</h3><div class="ptarget">${esc(sentence)}</div><p style="color:var(--sub);font-weight:700">🔴 듣고 있어요...</p></div>`;
  document.getElementById('pronModal').classList.add('on');
  setTimeout(()=>{ try{ recog.start(); }catch(e){} },250);
}
function showPronResult(heard){
  const r=scorePron(pronTarget,heard);
  pronScores.push({sentence:pronTarget,score:r.score,weak:r.weak});
  const stars='⭐'.repeat(r.stars)+'☆'.repeat(5-r.stars);
  const msg=r.score>=90?"완벽해요! 🎉":r.score>=75?"아주 잘했어요! 👏":r.score>=60?"좋아요! 조금만 더 🙂":"좋은 시도예요! 다시 해볼까? 💪";
  const weak=r.weak.length?`<div class="pweak">🔍 더 연습할 단어: ${r.weak.map(esc).join(', ')}</div>`:`<div class="pweak" style="color:var(--grass)">모든 단어 또렷했어요! ✨</div>`;
  document.getElementById('pmodalBody').innerHTML=`<div class="pbig">${r.score>=75?'🌟':'🦊'}</div><h3>${msg}</h3>
    <div class="pstars">${stars}</div><div class="pscore" style="color:${r.score>=60?'var(--grass)':'var(--amber)'}">${r.score}점</div>

/* ============ 단어 퀴즈 (누적된 단어 기반 4지선다) ============ */
let quizQs=[], quizIdx=0, quizScore=0;
async function collectQuizWords(){
  const map={};
  Object.values(liveVocab).forEach(v=>{ if(v&&v.word&&v.kr) map[v.word.toLowerCase()]={word:v.word,kr:v.kr}; });
  if(P){ const keys=await store.list(`report:${P.id}:`);
    for(const k of keys){ const r=await store.get(k); if(r&&r.student&&r.student.vocab){ r.student.vocab.forEach(v=>{ if(v&&v.word&&v.kr) map[v.word.toLowerCase()]={word:v.word,kr:v.kr}; }); } }
  }
  return Object.values(map);
}
function closeQuiz(){ document.getElementById('quizModal').classList.remove('on'); speechSynthesis.cancel(); }
function shuffleArr(a){ return a.slice().sort(()=>Math.random()-0.5); }
// 단어 → 한국어 뜻 4지선다 (기본·폴백·혼합용)
function localMeaningQuiz(words){
  return shuffleArr(words).slice(0,10).map(correct=>{
    const distractors=shuffleArr(words.filter(w=>w.word!==correct.word)).slice(0,3).map(w=>w.kr);
    const opts=shuffleArr([correct.kr,...distractors]);
    return {word:correct.word, answer:correct.kr, opts, hint:'🔊 이 단어의 뜻은?'};
  });
}
// 영영뜻·반대말·유의어 (Claude가 매번 새로 생성 → 실행할 때마다 다른 문제)
async function aiQuiz(words){
  const picked=shuffleArr(words).slice(0,8);
  const listStr=picked.map(w=>`- ${w.word} (${w.kr})`).join('\n');
  const seed=Math.floor(Math.random()*100000);
  const system=`You make a fun, SIMPLE English vocabulary quiz for a ${childAge}-year-old Korean learner. Words she has learned:
${listStr}

Make up to 6 multiple-choice questions, MIXING these three types:
- "def": show the WORD; the 4 options are SHORT, very simple English definitions; the correct one defines the word.
- "antonym": show the WORD; the 4 options are English words; the correct one is the OPPOSITE (반대말).
- "synonym": show the WORD; the 4 options are English words; the correct one has a SIMILAR meaning (비슷한말).
Rules: keep everything simple enough for a ${childAge}-year-old. Exactly 4 options each, only ONE correct. Wrong options must be clearly wrong but believable. If a word has no clear antonym, use "def" or "synonym" for it. Make it fresh (seed ${seed}). Do NOT use double quotes inside any option text.
Return ONLY JSON (no markdown): {"questions":[{"type":"def|antonym|synonym","word":"the word","options":["...","...","...","..."],"answer":<0-3 correct index>}]}`;
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,system,messages:[{role:'user',content:'Make the quiz now.'}]})});
    const data=await res.json();
    const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    const obj=JSON.parse(raw.replace(/```json|```/g,'').trim());
    return (obj.questions||[]).filter(q=>q&&q.word&&Array.isArray(q.options)&&q.options.length===4&&typeof q.answer==='number'&&q.answer>=0&&q.answer<4).map(q=>{
      const opts=q.options.map(o=>String(o).replace(/"/g,'').trim());
      const ans=opts[q.answer];
      const hint=q.type==='antonym'?'🔁 이 단어의 반대말은?':q.type==='synonym'?'🤝 이 단어와 비슷한 말은?':'📖 이 단어의 영어 뜻은?';
      return {word:String(q.word), answer:ans, opts:shuffleArr(opts), hint};
    });
  }catch(e){ return []; }
}
async function openQuiz(){
  const words=await collectQuizWords();
  const modal=document.getElementById('quizModal'), body=document.getElementById('quizBody');
  modal.classList.add('on');
  if(words.length<4){ body.innerHTML=`<div class="pbig">📚</div><h3>단어가 조금 더 모이면<br>퀴즈를 풀 수 있어요!</h3><p style="color:var(--sub);font-weight:700;margin-top:6px">지금 ${words.length}개 모음 · 4개 이상이면 시작해요</p><div class="prow"><button class="p-ok" id="qClose">확인</button></div>`; document.getElementById('qClose').onclick=closeQuiz; return; }
  body.innerHTML=`<div class="pbig">🦊</div><h3>퀴즈 만드는 중...</h3><p style="color:var(--sub);font-weight:700;margin-top:6px">배운 단어로 새 문제를 만들어요</p>`;
  const ai=await aiQuiz(words);                                 // 영영뜻·반대말·유의어
  const local=localMeaningQuiz(words);                          // 뜻 고르기
  quizQs = ai.length ? shuffleArr(ai.concat(local)).slice(0,10) : local.slice(0,10);
  quizIdx=0; quizScore=0; renderQuizQ();
}
function renderQuizQ(){
  const body=document.getElementById('quizBody');
  if(quizIdx>=quizQs.length){
    const total=quizQs.length, pct=Math.round(quizScore/total*100);
    if(P){ store.get('quizbest:'+P.id).then(prev=>{ if(pct>(prev||0)) store.set('quizbest:'+P.id,pct); }); addBonus(quizScore*2); }
    const face=pct>=80?'🌟':pct>=50?'🦊':'💪', msg=pct>=80?'최고야! 단어 박사! 🎉':pct>=50?'잘했어! 조금만 더!':'좋은 도전이야! 다시 해볼까?';
    body.innerHTML=`<div class="pbig">${face}</div><h3>${msg}</h3><div class="pscore" style="color:var(--grass)">${quizScore} / ${total}</div><div class="prow"><button class="p-retry" id="qRetry">🔁 다시 풀기</button><button class="p-ok" id="qClose">확인</button></div>`;
    document.getElementById('qRetry').onclick=openQuiz; document.getElementById('qClose').onclick=closeQuiz; return;
  }
  const q=quizQs[quizIdx];
  body.innerHTML=`<div class="qtop">${quizIdx+1} / ${quizQs.length}</div><div class="qword">${esc(q.word)}</div><div class="qhint">${esc(q.hint||'🔊 이 단어의 뜻은?')}</div><div class="qopts">${q.opts.map(o=>`<button class="qopt" data-o="${esc(o)}">${esc(o)}</button>`).join('')}</div>`;
  speak(q.word);
  body.querySelectorAll('.qopt').forEach(b=>b.onclick=()=>{
    const correct=b.dataset.o===q.answer;
    body.querySelectorAll('.qopt').forEach(x=>{ x.disabled=true; if(x.dataset.o===q.answer) x.classList.add('right'); else if(x===b) x.classList.add('wrong'); });
    if(correct) quizScore++;
    setTimeout(()=>{ quizIdx++; renderQuizQ(); }, correct?750:1400);
  });
}

function calcStreak(daysSet){
  const key=d=>`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  const d=new Date();
  if(!daysSet.has(key(d))){ d.setDate(d.getDate()-1); if(!daysSet.has(key(d))) return 0; }
  let n=0; while(daysSet.has(key(d))){ n++; d.setDate(d.getDate()-1); } return n;
}
async function profileStats(){
  const keys=await store.list(`report:${P.id}:`);
  const reports=[]; for(const k of keys){ const r=await store.get(k); if(r) reports.push(r); }
  const words=new Set(); let bestPron=0, maxLevel=levelInfo(P.level||1.6).n; const days=new Set();
  reports.forEach(r=>{
    if(r.student&&r.student.vocab) r.student.vocab.forEach(v=>{ if(v&&v.word) words.add(v.word.toLowerCase()); });
    if(r.pron&&r.pron.avg>bestPron) bestPron=r.pron.avg;
    if(r.levelNum>maxLevel) maxLevel=r.levelNum;
    const d=new Date(r.ts); days.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
  });
  const bestQuiz=(await store.get('quizbest:'+P.id))||0;
  return {sessions:reports.length, words:words.size, bestPron, maxLevel, bestQuiz, streak:calcStreak(days)};
}

  if(fresh.length || earned.length!==seen.length){ await store.set('badges:'+P.id,[...new Set([...seen,...earned])]); }
  if(doCelebrate && fresh.length) celebrateBadges(fresh.map(id=>BADGES.find(b=>b.id===id)));
  return earned;
}

let memCards=[], memFlip=[], memDone=0, memLock=false;
async function startMemory(){
  const words=await collectQuizWords();
  const body=document.getElementById('gameBody'); document.getElementById('gameModal').classList.add('on');
  const lvl=levelInfo(levelEMA).n;
  const pairs=Math.min([3,3,4,5,6][lvl-1]||4, words.length);
  if(pairs<3){ body.innerHTML=`<div class="pbig">🃏</div><h3>단어가 조금 더 모이면<br>짝 맞추기를 할 수 있어요!</h3><p class="sub2" style="margin-top:6px">지금 ${words.length}개 · 3개 이상 필요해요</p><div class="prow"><button class="p-ok" id="gBack">확인</button></div>`; document.getElementById('gBack').onclick=openGamePlayground; return; }
  const chosen=words.slice().sort(()=>Math.random()-0.5).slice(0,pairs);
  memCards=[]; chosen.forEach((w,i)=>{ memCards.push({pair:i,face:w.word,en:true}); memCards.push({pair:i,face:w.kr,en:false}); });
  memCards.sort(()=>Math.random()-0.5); memFlip=[]; memDone=0; memLock=false; renderMemory();
}
function renderMemory(){
  const body=document.getElementById('gameBody');
  const cols=memCards.length<=8?3:4;
  body.innerHTML=`<div class="gtop"><span>🃏 짝 맞추기 (${memDone}/${memCards.length/2})</span><button class="gx" id="gClose">✕</button></div>
    <div class="memgrid" style="grid-template-columns:repeat(${cols},1fr)">${memCards.map((c,i)=>`<button class="memcard ${c.matched?'matched':''} ${c.up?'up':''}" data-i="${i}">${(c.up||c.matched)?esc(c.face):'❓'}</button>`).join('')}</div>`;
  document.getElementById('gClose').onclick=closeGame;
  body.querySelectorAll('.memcard').forEach(b=>b.onclick=()=>flipCard(+b.dataset.i));
}
function flipCard(i){
  if(memLock) return; const c=memCards[i]; if(!c||c.up||c.matched) return;
  c.up=true; if(c.en) speak(c.face); memFlip.push(i); renderMemory();
  if(memFlip.length===2){
    memLock=true; const [a,b]=memFlip;
    if(memCards[a].pair===memCards[b].pair){
      setTimeout(()=>{ memCards[a].matched=memCards[b].matched=true; memFlip=[]; memDone++; memLock=false; (memDone===memCards.length/2)?memWin():renderMemory(); },550);
    } else {
      setTimeout(()=>{ memCards[a].up=memCards[b].up=false; memFlip=[]; memLock=false; renderMemory(); },950);
    }
  }
}
function memWin(){
  addBonus(15);
  document.getElementById('gameBody').innerHTML=`<div class="pbig">🎉</div><h3>다 맞췄어요! 최고예요!</h3><div class="pscore" style="color:var(--amber)">⭐ +15 별!</div><div class="prow"><button class="p-retry" id="mRetry">🔁 다시</button><button class="p-ok" id="mBack">놀이터로</button></div>`;

}

async function buyItem(id){
  const it=ITEMS.find(x=>x.id===id); if(!it||!P) return;
  const owned=(await store.get('owned:'+P.id))||[];
  if(owned.includes(id)){ equipItem(id); return; }
  const bal=await loadCoins();
  if(bal<it.price){ const m=document.getElementById('shopMsg'); if(m){ m.textContent=' · 별이 부족해요!'; setTimeout(()=>{ if(m)m.textContent=''; },1600); } return; }
  const spent=(await store.get('coinspent:'+P.id))||0; await store.set('coinspent:'+P.id, spent+it.price);
  owned.push(id); await store.set('owned:'+P.id, owned);
  amyOutfit[it.cat]=id; await store.set('amyOutfit:'+P.id, amyOutfit);   // 산 즉시 착용
  renderAmy(); await renderShop(); celebrate(it.emoji,'GET! 🎁',`<b>${esc(it.name)}</b> 을(를) 얻었어요!`);
}
async function equipItem(id){
  const it=ITEMS.find(x=>x.id===id); if(!it||!P) return;
  amyOutfit[it.cat] = (amyOutfit[it.cat]===id)?null:id;   // 다시 누르면 벗기
  await store.set('amyOutfit:'+P.id, amyOutfit);
  renderAmy(); await renderShop();
}

async function renderHistory(){
  const el=document.getElementById('historyBody');
  if(!profiles.length){ el.innerHTML=`<div class="report">${emptyBlock("학생을 먼저 등록해주세요","")}</div>`; return; }
  if(!histProfileId||!profiles.find(p=>p.id===histProfileId)) histProfileId=(P&&P.id)||profiles[0].id;
  const chips=profiles.map(p=>`<button class="pchip ${p.id===histProfileId?'on':''}" data-pid="${p.id}">${p.emoji} ${esc(p.name)}</button>`).join('');
  const keys=await store.list(`report:${histProfileId}:`);
  const items=[];
  for(const k of keys){ const r=await store.get(k); if(r) items.push(r); }
  items.sort((a,b)=>b.ts-a.ts);
  const listHTML = items.length
    ? items.map(r=>`<div class="hitem" data-ts="${r.ts}"><div><div class="hdate">${esc(r.whenStr||fmtWhen(r.ts,r.dateStr))}</div><div class="hsub">${r.pron?'🎙️ '+r.pron.avg+'점 · ':''}${(r.student&&r.student.vocab?r.student.vocab.length:0)}개 단어</div></div><div class="hlv">${esc(r.levelLabel||'')}</div><div class="hdel" data-del="${r.ts}">🗑️</div></div>`).join('')
    : `<div class="empty"><div class="e">🗓️</div><h3>아직 저장된 대화 기록이 없어요</h3><p>회화를 정리하면 대화별로 여기에 쌓여요.</p></div>`;
  el.innerHTML=`<div class="report">
    <div class="rhead"><div class="r-emoji">📅</div><div><h2 class="display">대화 기록</h2><div class="date">프로필을 골라 대화별 보고서를 봐요</div></div></div>
    <div class="pchips">${chips}</div>
    ${listHTML}</div>`;
  el.querySelectorAll('.pchip').forEach(c=>c.onclick=()=>{ histProfileId=c.dataset.pid; renderHistory(); });
  el.querySelectorAll('.hitem').forEach(it=>{ it.onclick=async(e)=>{ if(e.target.dataset.del){ if(confirm("이 대화 기록을 삭제할까요?")){ await store.del(`report:${histProfileId}:${e.target.dataset.del}`); renderHistory(); } return; } const r=await store.get(`report:${histProfileId}:${it.dataset.ts}`); openHistDetail(r); }; });
}

    ${studentHTML(r,r.name,when,false)}<div style="height:8px"></div>${parentHTML(r,r.name,when,false)}`;

}

async function loadProfiles(){ profiles=await store.get('profiles')||[]; activeId=await store.get('activeId'); }
async function saveProfiles(){ await store.set('profiles',profiles); }
function renderProfileSheet(){
  const list=document.getElementById('profList'), title=document.getElementById('psTitle');
  if(profiles.length){ title.textContent="👋 학생을 골라주세요"; document.getElementById('closeSheet').style.display=P?'block':'none'; }

  const grid=document.getElementById('emojiGrid');
  grid.innerHTML=EMOJIS.map(e=>`<button class="${e===selEmoji?'sel':''}" data-e="${e}">${e}</button>`).join('');

async function deleteProfile(id){
  const keys=await store.list(`report:${id}:`); for(const k of keys) await store.del(k);
  profiles=profiles.filter(p=>p.id!==id); await saveProfiles();
  if(activeId===id){ activeId=null; P=null; }
  renderProfileSheet(); if(profiles.length===0){ document.getElementById('profileSheet').classList.add('on'); }
}

/* ============ 음성 인식 ============ */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const mic=document.getElementById('mic'), convoBtn=document.getElementById('convoBtn');
let recog=null;
function startListen(){
  if(!SR||recording||amySpeaking||awaitingReply||recMode==='pron') return;
  recMode='chat'; try{ recog.start(); recording=true; mic.classList.add('rec'); hint.textContent=continuousMode?'🔴 계속 대화 중 · 말하면 자동으로 전달돼요':'🔴 듣고 있어요... 영어로 말해보세요!'; }catch(e){}
}
function stopListen(){ try{ if(recog) recog.stop(); }catch(e){} }
function resumeIfContinuous(){ if(continuousMode && recMode==='chat' && !amySpeaking && !awaitingReply) setTimeout(startListen,300); }

if(SR){
  recog=new SR(); recog.lang='en-US'; recog.interimResults=false; recog.maxAlternatives=1;
  recog.onresult=e=>{ const t=e.results[0][0].transcript; if(recMode==='pron'){ showPronResult(t); } else { txt.value=t; } };
  recog.onend=()=>{
    if(recMode==='pron'){ recMode='chat'; return; }
    recording=false; mic.classList.remove('rec');
    if(txt.value.trim()){ submit(); return; }               // 말한 게 있으면 자동 전송
    if(continuousMode && !amySpeaking && !awaitingReply){ startListen(); return; } // 침묵이면 계속 듣기
    hint.textContent='🎤 버튼을 누르고 영어로 대답해보세요';
  };
  recog.onerror=ev=>{
    recording=false; mic.classList.remove('rec');
    const code=(ev&&ev.error)||'unknown';
    if(recMode==='pron'){ recMode='chat'; document.getElementById('pronModal').classList.remove('on'); resumeIfContinuous(); return; }
    // 재시도해도 소용없는 치명적 에러 → 연속모드 끄고 안내
    if(code==='network'||code==='service-not-allowed'){ continuousMode=false; convoBtn.classList.remove('on'); convoBtn.textContent='▶️ 계속 대화하기 (핸즈프리)'; hint.textContent='⚠️ 음성인식 서버 연결 실패('+code+') · 이 브라우저는 지원 안 될 수 있어요. 정식 Chrome이나 아이폰 Safari로 열어주세요'; return; }
    if(code==='not-allowed'){ continuousMode=false; convoBtn.classList.remove('on'); convoBtn.textContent='▶️ 계속 대화하기 (핸즈프리)'; hint.textContent='🎙️ 마이크 권한이 꺼져 있어요 (주소창 옆 마이크 아이콘에서 허용)'; return; }
    if(code==='audio-capture'){ continuousMode=false; convoBtn.classList.remove('on'); hint.textContent='🎙️ 마이크를 찾을 수 없어요 · 마이크 연결을 확인해주세요'; return; }
    // no-speech / aborted 등 가벼운 에러
    if(continuousMode && !amySpeaking && !awaitingReply){ setTimeout(startListen,500); return; }
    hint.textContent='🎤 다시 눌러서 말해보세요 ('+code+')';
  };
  mic.onclick=()=>{ if(recording){ stopListen(); return; } speechSynthesis.cancel(); startListen(); };
  convoBtn.onclick=()=>{
    continuousMode=!continuousMode;
    if(continuousMode){ convoBtn.classList.add('on'); convoBtn.textContent='⏸️ 계속 대화 멈추기'; speechSynthesis.cancel(); if(!amySpeaking&&!awaitingReply) startListen(); }
    else{ convoBtn.classList.remove('on'); convoBtn.textContent='▶️ 계속 대화하기 (핸즈프리)'; stopListen(); hint.textContent='🎤 버튼을 누르고 영어로 대답해보세요'; }
  };
}else{
  mic.onclick=()=>{ hint.textContent='이 브라우저는 음성인식을 지원하지 않아요. Chrome/웨일에서 열어주세요!'; };
  convoBtn.onclick=()=>{ hint.textContent='이 브라우저는 음성인식을 지원하지 않아요. Chrome/웨일에서 열어주세요!'; };
}
